<!DOCTYPE html>
<html lang="hu">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Keil Miksa | 5. házi</title>
        <link rel="stylesheet" href="./css/styles.css" />
        <link rel="icon" type="image/x-icon" href="favicon.ico" />
    </head>

    <body>
        <div id="main">
            <div class="container">
                <nav>
                    <a href="index.html"
                        ><img src="./img/logo.png" alt="" class="logo"
                    /></a>
                    <ul class="nav-list">
                        <li><a href="index.html">Kezdőlap</a></li>
                        <li><a href="contanct.html">Kapcsolat</a></li>
                        <li><a href="services.html">Szolgáltatások</a></li>
                    </ul>
                    <img src="./img/menu.svg" alt="" class="menu-btn" />
                </nav>

                <div class="main-content">
                    <h1 class="intro-heading">
                        Vegye fel velünk a kapcsolatot!
                    </h1>
                </div>
            </div>
        </div>

        <section id="contatct">
            <div class="contact-container">
                <form
                    action="submit_form.php"
                    method="post"
                    class="contact-form"
                >
                    <h1>Írjon nekünk!</h1>
                    <div class="form-group">
                        <label for="name">Név:</label>
                        <input type="text" id="name" name="name" required />
                    </div>
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required />
                    </div>
                    <div class="form-group">
                        <label for="message">Üzenet:</label>
                        <textarea
                            id="message"
                            name="message"
                            rows="4"
                            required
                        ></textarea>
                    </div>
                    <button class="btn-contact" type="submit">Küldés</button>
                </form>
            </div>
        </section>

        <footer>
            <div class="container">
                <ul class="footer-links">
                    <li><a href="index.html">Kezdőlap</a></li>
                    <li><a href="contanct.html">Kapcsolat</a></li>
                    <li><a href="services.html">Szolgáltatások</a></li>
                </ul>
                <a href="index.html"
                    ><img src="./img/logo.png" alt="" class="footerlogo"
                /></a>
                <p>Webdesign by Keil Miksa</p>
            </div>
        </footer>

        <script>
            document
                .querySelector(".menu-btn")
                .addEventListener("click", function () {
                    document
                        .querySelector(".nav-list")
                        .classList.toggle("active");
                });
        </script>
    </body>
</html>
